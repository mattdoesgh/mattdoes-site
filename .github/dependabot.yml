# Dependabot — keep the small dependency surface current.
#
# The site has three npm package roots:
#   /              build pipeline (marked, lightningcss, …)
#   /workers       shared tooling for all three Workers (wrangler devDep)
#   /design-system React component library + build toolchain
#
# Weekly cadence: the dep set is small and the maintenance budget is solo,
# so daily PRs would only generate noise. Grouped minor + patch updates land
# as a single PR per ecosystem per week; major bumps still come as their
# own PR so they can be reviewed deliberately.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/workers"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/design-system"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
