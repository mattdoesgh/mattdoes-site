name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Security + dependency hygiene. Fails on moderate+ advisories in either
  # production or dev deps. Pinned to a single Node version (matches .nvmrc)
  # so the audit result is reproducible between runs. Cloudflare Pages
  # deploys independently of GitHub Actions, so a red audit blocks PR merge
  # but does not block the production deploy.
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (root)
        run: npm ci

      - name: Audit (root, prod + dev)
        run: npm run audit

      # Workers ship their own lockfile, so audit them too — same threshold.
      - name: Audit (workers/listening)
        working-directory: workers/listening
        run: npm audit --audit-level=moderate

  build:
    name: build + html-validate
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - name: Checkout site
        uses: actions/checkout@v4
        # Vault is private and cloned at deploy time on Cloudflare Pages.
        # CI builds against test/fixture-vault instead — no VAULT_TOKEN needed here.

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build against fixture vault
        env:
          VAULT_DIR: ${{ github.workspace }}/test/fixture-vault
          SITE_URL: https://mattdoes.online
        run: npm run build

      - name: Lint (html-validate)
        run: npm run lint

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7
