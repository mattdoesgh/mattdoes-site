name: build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Security + dependency hygiene. Fails on moderate+ advisories in either
  # production or dev deps. Pinned to a single Node version (matches .nvmrc)
  # so the audit result is reproducible between runs. Cloudflare Pages
  # deploys independently of GitHub Actions, so a red audit blocks PR merge
  # but does not block the production deploy.
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # --ignore-scripts skips the root postinstall (which installs the
      # design-system toolchain) — audit root + workers first, then pull in
      # the design-system lockfile explicitly below.
      - name: Install (root)
        run: npm ci --ignore-scripts

      - name: Audit (root, prod + dev)
        run: npm run audit

      - name: Install + audit (design-system)
        run: |
          npm --prefix design-system ci --include=dev
          npm --prefix design-system audit --audit-level=moderate

      # Workers ship their own lockfile, so audit them too — same threshold.
      - name: Audit (workers/listening)
        working-directory: workers/listening
        run: npm audit --audit-level=moderate

      - name: Audit (workers/geo)
        working-directory: workers/geo
        run: npm audit --audit-level=moderate

      - name: Audit (workers/csp-report)
        working-directory: workers/csp-report
        run: npm audit --audit-level=moderate

  build:
    name: build + html-validate
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - name: Checkout site
        uses: actions/checkout@v7
        # Vault is private and cloned at deploy time on Cloudflare Pages.
        # CI builds against test/fixture-vault instead — no VAULT_TOKEN needed here.

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm ci` triggers the root `postinstall`, which installs the
      # design-system deps (react/react-dom + build toolchain) so the `prebuild`
      # hook can build the SSG bundle that lib/emit/ imports (ADR 0003/0005).
      - name: Install
        run: npm ci

      # The site build transpiles the SSG bundle with esbuild (no type check),
      # so type-check the design system explicitly to enforce the render*/page
      # prop contracts (ADR 0005).
      - name: Typecheck (design-system)
        run: npm --prefix design-system run typecheck

      - name: Build against fixture vault
        env:
          VAULT_DIR: ${{ github.workspace }}/test/fixture-vault
          SITE_URL: https://mattdoes.online
          # CI has no Last.fm creds and no cache; stay offline so the build
          # never depends on the live Worker (lib/listening.js). The static
          # listening snapshot is empty here — the deployed site builds with a
          # real SITE_URL and reaches the Worker.
          LISTENING_OFFLINE: '1'
        run: npm run build

      - name: Lint (html-validate)
        run: npm run lint

      - name: Check asset budget
        run: npm run check:assets

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 7

  # Regression suite. Runs the node:test files under test/ (build input
  # validation, URL output safety, Atom feed standards, structural
  # accessibility via axe/jsdom, token-level contrast, Worker robustness,
  # privacy storage, progressive enhancement, and W3C/lint coverage).
  # `npm test` is self-contained — its `pretest` step builds the fixture
  # vault, and build-dependent tests rebuild in their own before() hooks.
  test:
    name: regression tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # `npm ci` triggers the root `postinstall` (design-system deps), so the
      # fixture builds in the suite can build + import the SSG bundle.
      - name: Install
        run: npm ci

      - name: Run regression test suite
        run: npm test
